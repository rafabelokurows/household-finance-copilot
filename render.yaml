services:
  - type: web
    name: hfc-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CONFIDENCE_THRESHOLD
        value: "0.90"
      - key: ALLOWED_ORIGIN
        sync: false
    healthCheckPath: /health
